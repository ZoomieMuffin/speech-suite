name: Claude PR Human Checklist

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: claude-pr-human-checklist-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checklist:
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Prepare prompt
        id: prepare
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p .tmp
          python scripts/prepare_pr_human_checklist.py

      - name: Generate checklist with Claude
        if: ${{ steps.prepare.outputs.enabled == 'true' }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: ${{ steps.prepare.outputs.prompt }}
          show_full_output: 'true'
          claude_args: |
            --max-turns 4

      - name: Update checklist comment
        if: ${{ steps.prepare.conclusion == 'success' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
          CHECKLIST_ENABLED: ${{ steps.prepare.outputs.enabled }}
        run: python scripts/upsert_pr_human_checklist_comment.py
