name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build AudioInput (Release)
        working-directory: audio-input
        run: swift build -c release

      - name: Package binary
        run: |
          PRODUCT_NAME=$(cd audio-input && swift package describe --type json 2>/dev/null | python3 -c "import sys,json; ts=json.load(sys.stdin)['targets']; print(next(t['name'] for t in ts if t['type']=='executable'))")
          BINARY_PATH="audio-input/.build/release/${PRODUCT_NAME}"
          ARCHIVE="${PRODUCT_NAME}-$(git describe --tags --always).tar.gz"
          tar czf "$ARCHIVE" -C "$(dirname "$BINARY_PATH")" "$(basename "$BINARY_PATH")"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          files: ${{ env.ARCHIVE }}
          generate_release_notes: true
