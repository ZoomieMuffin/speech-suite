name: CI

on:
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build
        working-directory: speech-core
        run: swift build

      - name: Test
        working-directory: speech-core
        run: swift test
