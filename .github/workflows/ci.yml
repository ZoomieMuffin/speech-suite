name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build
        working-directory: speech-core
        run: swift build

      - name: Test
        working-directory: speech-core
        run: swift test

      - name: Build (iOS Simulator)
        working-directory: speech-core
        run: |
          swift build \
            -Xswiftc -sdk \
            -Xswiftc $(xcrun --sdk iphonesimulator --show-sdk-path) \
            -Xswiftc -target \
            -Xswiftc arm64-apple-ios17.0-simulator

      - name: Build (iOS)
        working-directory: speech-core
        run: |
          swift build \
            -Xswiftc -sdk \
            -Xswiftc $(xcrun --sdk iphoneos --show-sdk-path) \
            -Xswiftc -target \
            -Xswiftc arm64-apple-ios17.0
