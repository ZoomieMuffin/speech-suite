name: CI

on:
  pull_request:
    branches: [main]

jobs:
  speech-core:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Test
        working-directory: speech-core
        run: swift test

      - name: Build (iOS Simulator)
        working-directory: speech-core
        run: xcodebuild -scheme SpeechCore -destination 'generic/platform=iOS Simulator' build

      - name: Build (iOS)
        working-directory: speech-core
        run: xcodebuild -scheme SpeechCore -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO build

  audio-input:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Get Swift version
        id: swift-version
        run: echo "version=$(swift --version | head -1 | shasum -a 256 | cut -c1-8)" >> "$GITHUB_OUTPUT"

      - name: Cache SwiftPM
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: audio-input/.build
          key: ${{ runner.os }}-${{ runner.arch }}-swift${{ steps.swift-version.outputs.version }}-spm-audio-input-${{ hashFiles('audio-input/Package.resolved', 'audio-input/Package.swift') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-swift${{ steps.swift-version.outputs.version }}-spm-audio-input-

      - name: Build and Test
        working-directory: audio-input
        run: |
          set -euo pipefail
          HAS_TESTS=$(swift package describe --type json | python3 -c "import sys,json; print('true' if any(t['type']=='test' for t in json.load(sys.stdin)['targets']) else 'false')")
          if [ "$HAS_TESTS" = "true" ]; then
            swift test
          else
            swift build
          fi

  notify:
    runs-on: ubuntu-latest
    needs: [speech-core, audio-input]
    if: always()
    steps:
      - name: Notify Telegram
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets not configured, skipping notification."
            exit 0
          fi
          if [ "${{ needs.speech-core.result }}" = "success" ] && [ "${{ needs.audio-input.result }}" = "success" ]; then
            STATUS="✅ Success"
          else
            STATUS="❌ Failed"
          fi
          TEXT="${STATUS} CI: ${{ github.repository }}
          Branch: ${{ github.head_ref }}
          PR: ${{ github.event.pull_request.title }}
          speech-core: ${{ needs.speech-core.result }}
          audio-input: ${{ needs.audio-input.result }}
          ${{ github.event.pull_request.html_url }}"
          curl -s --fail -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${TEXT}"
