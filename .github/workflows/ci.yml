name: CI

on:
  pull_request:
    branches: [main]

jobs:
  speech-core:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build
        working-directory: speech-core
        run: swift build

      - name: Test
        working-directory: speech-core
        run: swift test

      - name: Build (iOS Simulator)
        working-directory: speech-core
        run: xcodebuild -scheme SpeechCore -destination 'generic/platform=iOS Simulator' build

      - name: Build (iOS)
        working-directory: speech-core
        run: xcodebuild -scheme SpeechCore -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO build

  audio-input:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Cache SwiftPM
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: audio-input/.build
          key: ${{ runner.os }}-spm-audio-input-${{ hashFiles('audio-input/Package.resolved', 'audio-input/Package.swift') }}
          restore-keys: ${{ runner.os }}-spm-audio-input-

      - name: Build
        working-directory: audio-input
        run: swift build

      - name: Check test targets exist
        id: check-tests
        working-directory: audio-input
        run: |
          if ls Tests/*/*.swift 1>/dev/null 2>&1; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Test
        if: steps.check-tests.outputs.has_tests == 'true'
        working-directory: audio-input
        run: swift test
