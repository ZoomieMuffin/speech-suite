name: CI

on:
  pull_request:
    branches: [main]

jobs:
  speech-core:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Test
        working-directory: speech-core
        run: swift test

      - name: Build (iOS Simulator)
        working-directory: speech-core
        run: xcodebuild -scheme SpeechCore -destination 'generic/platform=iOS Simulator' build

      - name: Build (iOS)
        working-directory: speech-core
        run: xcodebuild -scheme SpeechCore -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO build

  audio-input:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Cache SwiftPM
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: audio-input/.build
          key: ${{ runner.os }}-${{ runner.arch }}-spm-audio-input-${{ hashFiles('audio-input/Package.resolved', 'audio-input/Package.swift') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-spm-audio-input-

      - name: Build and Test
        working-directory: audio-input
        run: |
          if swift package describe --type json 2>/dev/null | python3 -c "import sys,json; sys.exit(0 if any(t['type']=='test' for t in json.load(sys.stdin)['targets']) else 1)"; then
            swift test
          else
            swift build
          fi
